<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора - Управление товарами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-home {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .add-product-form {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .add-product-form h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .form-field {
            display: flex;
            flex-direction: column;
        }
        .form-field label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
            font-size: 13px;
        }
        .form-field input, .form-field select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-field textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            max-height: 200px;
            overflow-y: auto;
        }
        .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-add {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-add:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-select, .sort-select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        .btn-search, .btn-reset {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-search {
            background: #667eea;
            color: white;
        }
        .btn-search:hover {
            background: #5a67d8;
        }
        .btn-reset {
            background: #6c757d;
            color: white;
        }
        .btn-reset:hover {
            background: #5a6268;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }
        th:hover {
            background: #5a67d8;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .product-image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }
        .stock-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .stock-high {
            background: #d4edda;
            color: #28a745;
        }
        .stock-low {
            background: #fff3cd;
            color: #856404;
        }
        .stock-out {
            background: #f8d7da;
            color: #dc3545;
        }
        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin: 0 2px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
        }
        .btn-edit {
            background: #ffc107;
            color: #333;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 25px;
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
        }
        .modal h3 {
            margin-bottom: 20px;
            color: #667eea;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal-btn.save {
            background: #28a745;
            color: white;
        }
        .modal-btn.cancel {
            background: #6c757d;
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            animation: slideInRight 0.3s ease-out;
        }
        .toast.error {
            background: #f56565;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .container { padding: 15px; }
            th, td { padding: 8px; font-size: 12px; }
            .stats { flex-direction: column; }
            .form-grid { grid-template-columns: 1fr; }
            .search-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Панель администратора</h1>
            <button class="btn-home" onclick="goToHome()">🏠 На главную</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Всего товаров</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="inStockCount">0</div>
                <div class="stat-label">В наличии</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lowStockCount">0</div>
                <div class="stat-label">Мало осталось</div>
            </div>
        </div>
        
        <!-- Форма добавления товара -->
        <div class="add-product-form">
            <h3>➕ Добавить новый товар</h3>
            <div class="form-grid">
                <div class="form-field">
                    <label>Название:</label>
                    <input type="text" id="newName" placeholder="Например: Диван 'Комфорт'">
                </div>
                <div class="form-field">
                    <label>Категория:</label>
                    <select id="newCategoryId"></select>
                </div>
                <div class="form-field">
                    <label>Производитель (Бренд):</label>
                    <input type="text" id="newManufacturer" placeholder="Например: Мария">
                </div>
                <div class="form-field">
                    <label>Материал:</label>
                    <input type="text" id="newMaterial" placeholder="Например: Массив сосны, ЛДСП...">
                </div>
                <div class="form-field">
                    <label>Цвет:</label>
                    <input type="text" id="newColor" placeholder="Например: Дуб, Орех...">
                </div>
                <div class="form-field">
                    <label>Тип:</label>
                    <input type="text" id="newType" placeholder="Корпусная, мягкая...">
                </div>
                <div class="form-field">
                    <label>Цена (₽):</label>
                    <input type="number" id="newPrice" placeholder="0" value="0">
                </div>
                <div class="form-field">
                    <label>Количество:</label>
                    <input type="number" id="newQuantity" placeholder="0" value="0">
                </div>
                <div class="form-field">
                    <label>Описание:</label>
                    <textarea id="newDescription" rows="2" placeholder="Краткое описание товара" style="resize: vertical; min-height: 60px;"></textarea>
                </div>
                <div class="form-field">
                    <label>Изображение URL:</label>
                    <input type="text" id="newImageUrl" placeholder="https://...">
                </div>
            </div>
            <button class="btn-add" onclick="addProduct()">➕ Добавить товар</button>
        </div>
        
        <!-- Поиск и фильтры -->
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по названию...">
            <select id="categoryFilter" class="filter-select">
                <option value="">Все категории</option>
            </select>
            <select id="stockFilter" class="filter-select">
                <option value="all">Все товары</option>
                <option value="in_stock">В наличии</option>
                <option value="low_stock">Мало осталось (&lt;5)</option>
                <option value="out_of_stock">Нет в наличии</option>
            </select>
            <select id="sortSelect" class="sort-select">
                <option value="id_asc">По ID (возрастание)</option>
                <option value="id_desc">По ID (убывание)</option>
                <option value="name_asc">По названию (А-Я)</option>
                <option value="name_desc">По названию (Я-А)</option>
                <option value="price_asc">По цене (возрастание)</option>
                <option value="price_desc">По цене (убывание)</option>
                <option value="stock_asc">По наличию (сначала мало)</option>
                <option value="stock_desc">По наличию (сначала много)</option>
            </select>
            <button class="btn-search" onclick="searchProducts()">🔍 Найти</button>
            <button class="btn-reset" onclick="resetFilters()">🔄 Сбросить</button>
        </div>
        
        <!-- Таблица товаров -->
        <div style="overflow-x: auto;">
            <table id="productsTable">
                <thead>
                    <tr>
                        <th onclick="sortBy('id')">ID ⬍</th>
                        <th>Изображение</th>
                        <th onclick="sortBy('name')">Название ⬍</th>
                        <th>Категория</th>
                        <th>Бренд</th>
                        <th>Материал</th>
                        <th>Цвет</th>
                        <th>Тип</th>
                        <th onclick="sortBy('price')">Цена ⬍</th>
                        <th onclick="sortBy('stock')">Наличие ⬍</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="productsBody"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Модальное окно редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Редактировать товар</h3>
            <input type="hidden" id="editId">
            <div class="form-grid">
                <div class="form-field">
                    <label>Название:</label>
                    <input type="text" id="editName">
                </div>
                <div class="form-field">
                    <label>Категория:</label>
                    <select id="editCategoryId"></select>
                </div>
                <div class="form-field">
                    <label>Производитель:</label>
                    <input type="text" id="editManufacturer">
                </div>
                <div class="form-field">
                    <label>Материал:</label>
                    <input type="text" id="editMaterial">
                </div>
                <div class="form-field">
                    <label>Цвет:</label>
                    <input type="text" id="editColor">
                </div>
                <div class="form-field">
                    <label>Тип:</label>
                    <input type="text" id="editType">
                </div>
                <div class="form-field">
                    <label>Цена (₽):</label>
                    <input type="number" id="editPrice">
                </div>
                <div class="form-field">
                    <label>Количество:</label>
                    <input type="number" id="editQuantity">
                </div>
                <div class="form-field">
                    <label>Описание:</label>
                    <textarea id="editDescription" rows="2" style="resize: vertical; min-height: 60px;"></textarea>
                </div>
                <div class="form-field">
                    <label>Изображение URL:</label>
                    <input type="text" id="editImageUrl">
                </div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn save" onclick="saveEdit()">💾 Сохранить</button>
                <button class="modal-btn cancel" onclick="closeEditModal()">❌ Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        let allProducts = [];
        let categories = [];
        let currentSort = { field: 'id', order: 'asc' };
        
        function goToHome() {
            window.location.href = '/';
        }
        
        function showToast(message, type) {
            type = type || 'success';
            $('.toast').remove();
            var toast = $('<div class="toast ' + type + '">' + message + '</div>');
            $('body').append(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }
        
        function loadCategories() {
            $.get('/api/categories', function(data) {
                categories = data;
                var options = '<option value="">Выберите категорию</option>';
                for (var i = 0; i < categories.length; i++) {
                    options += '<option value="' + categories[i].id + '">' + categories[i].name + '</option>';
                }
                $('#newCategoryId').html(options);
                $('#editCategoryId').html(options);
                $('#categoryFilter').html('<option value="">Все категории</option>' + options);
            });
        }
        
        function loadProducts() {
            $.get('/api/products', function(products) {
                allProducts = products;
                renderProducts();
            });
        }
        
        function sortBy(field) {
            if (currentSort.field === field) {
                currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.order = 'asc';
            }
            renderProducts();
        }
        
        function renderProducts() {
            var searchTerm = $('#searchInput').val().toLowerCase();
            var categoryFilter = $('#categoryFilter').val();
            var stockFilter = $('#stockFilter').val();
            var sortType = $('#sortSelect').val();
            
            var filtered = allProducts.filter(function(p) {
                var matchSearch = p.name.toLowerCase().includes(searchTerm);
                var matchCategory = !categoryFilter || p.category?.id == categoryFilter;
                var matchStock = true;
                if (stockFilter === 'in_stock') matchStock = p.quantityInStock > 0;
                else if (stockFilter === 'low_stock') matchStock = p.quantityInStock > 0 && p.quantityInStock < 5;
                else if (stockFilter === 'out_of_stock') matchStock = p.quantityInStock === 0;
                return matchSearch && matchCategory && matchStock;
            });
            
            // Сортировка
            if (sortType === 'id_asc') {
                filtered.sort(function(a, b) { return a.id - b.id; });
            } else if (sortType === 'id_desc') {
                filtered.sort(function(a, b) { return b.id - a.id; });
            } else if (sortType === 'name_asc') {
                filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });
            } else if (sortType === 'name_desc') {
                filtered.sort(function(a, b) { return b.name.localeCompare(a.name); });
            } else if (sortType === 'price_asc') {
                filtered.sort(function(a, b) { return a.price - b.price; });
            } else if (sortType === 'price_desc') {
                filtered.sort(function(a, b) { return b.price - a.price; });
            } else if (sortType === 'stock_asc') {
                filtered.sort(function(a, b) { return a.quantityInStock - b.quantityInStock; });
            } else if (sortType === 'stock_desc') {
                filtered.sort(function(a, b) { return b.quantityInStock - a.quantityInStock; });
            }
            
            var total = allProducts.length;
            var inStock = allProducts.filter(function(p) { return p.quantityInStock > 0; }).length;
            var lowStock = allProducts.filter(function(p) { return p.quantityInStock > 0 && p.quantityInStock < 5; }).length;
            
            $('#totalCount').text(total);
            $('#inStockCount').text(inStock);
            $('#lowStockCount').text(lowStock);
            
            var tbody = $('#productsBody');
            tbody.empty();
            
            for (var i = 0; i < filtered.length; i++) {
                var p = filtered[i];
                var stockClass = '';
                var stockText = '';
                if (p.quantityInStock > 10) {
                    stockClass = 'stock-high';
                    stockText = '✅ ' + p.quantityInStock + ' шт.';
                } else if (p.quantityInStock > 0) {
                    stockClass = 'stock-low';
                    stockText = '⚠️ ' + p.quantityInStock + ' шт.';
                } else {
                    stockClass = 'stock-out';
                    stockText = '❌ Нет в наличии';
                }
                
                var categoryName = p.category ? p.category.name : '-';
                var imageHtml = p.imageUrl ? '<img src="' + p.imageUrl + '" class="product-image" onerror="this.src=\'https://via.placeholder.com/50\'">' : '<div style="width:50px;height:50px;background:#eee;border-radius:8px;display:flex;align-items:center;justify-content:center;">📷</div>';
                
                var row = '<tr>' +
                    '<td>' + p.id + '</td>' +
                    '<td>' + imageHtml + '</td>' +
                    '<td>' + escapeHtml(p.name) + '</td>' +
                    '<td>' + escapeHtml(categoryName) + '</td>' +
                    '<td>' + escapeHtml(p.manufacturer || '-') + '</td>' +
                    '<td>' + escapeHtml(p.material || '-') + '</td>' +
                    '<td>' + escapeHtml(p.color || '-') + '</td>' +
                    '<td>' + escapeHtml(p.type || '-') + '</td>' +
                    '<td><b>' + Number(p.price).toLocaleString() + ' ₽</b></td>' +
                    '<td><span class="stock-badge ' + stockClass + '">' + stockText + '</span></td>' +
                    '<td>' +
                        '<button class="action-btn btn-edit" onclick="openEditModal(' + p.id + ')">✏️</button>' +
                        '<button class="action-btn btn-delete" onclick="deleteProduct(' + p.id + ')">🗑️</button>' +
                    '</td>' +
                '</tr>';
                tbody.append(row);
            }
            
            if (filtered.length === 0) {
                tbody.append('<tr><td colspan="11" style="text-align:center;">Товары не найдены</td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td></tr>');
            }
        }
        
        function addProduct() {
            var product = {
                name: $('#newName').val(),
                category: { id: $('#newCategoryId').val() },
                manufacturer: $('#newManufacturer').val(),
                material: $('#newMaterial').val(),
                color: $('#newColor').val(),
                type: $('#newType').val(),
                price: $('#newPrice').val(),
                quantityInStock: $('#newQuantity').val(),
                description: $('#newDescription').val(),
                imageUrl: $('#newImageUrl').val()
            };
            
            if (!product.name) {
                showToast('Введите название товара', 'error');
                return;
            }
            
            $.ajax({
                url: '/admin/products/create',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(product),
                success: function() {
                    showToast('Товар добавлен успешно!');
                    $('#newName, #newManufacturer, #newMaterial, #newColor, #newType, #newDescription, #newImageUrl').val('');
                    $('#newPrice, #newQuantity').val(0);
                    loadProducts();
                },
                error: function() {
                    showToast('Ошибка добавления товара', 'error');
                }
            });
        }
        
        function openEditModal(id) {
            var product = allProducts.find(function(p) { return p.id === id; });
            if (product) {
                $('#editId').val(product.id);
                $('#editName').val(product.name);
                $('#editCategoryId').val(product.category ? product.category.id : '');
                $('#editManufacturer').val(product.manufacturer || '');
                $('#editMaterial').val(product.material || '');
                $('#editColor').val(product.color || '');
                $('#editType').val(product.type || '');
                $('#editPrice').val(product.price);
                $('#editQuantity').val(product.quantityInStock);
                $('#editDescription').val(product.description || '');
                $('#editImageUrl').val(product.imageUrl || '');
                $('#editModal').fadeIn(200);
            }
        }
        
        function saveEdit() {
            var product = {
                id: $('#editId').val(),
                name: $('#editName').val(),
                category: { id: $('#editCategoryId').val() },
                manufacturer: $('#editManufacturer').val(),
                material: $('#editMaterial').val(),
                color: $('#editColor').val(),
                type: $('#editType').val(),
                price: $('#editPrice').val(),
                quantityInStock: $('#editQuantity').val(),
                description: $('#editDescription').val(),
                imageUrl: $('#editImageUrl').val()
            };
            
            $.ajax({
                url: '/admin/products/update/' + product.id,
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify(product),
                success: function() {
                    showToast('Товар обновлён');
                    closeEditModal();
                    loadProducts();
                },
                error: function() {
                    showToast('Ошибка обновления товара', 'error');
                }
            });
        }
        
        function deleteProduct(id) {
            if (confirm('Удалить товар?')) {
                $.ajax({
                    url: '/admin/products/delete/' + id,
                    type: 'DELETE',
                    success: function() {
                        showToast('Товар удалён');
                        loadProducts();
                    },
                    error: function() {
                        showToast('Ошибка удаления товара', 'error');
                    }
                });
            }
        }
        
        function closeEditModal() {
            $('#editModal').fadeOut(200);
        }
        
        function searchProducts() {
            renderProducts();
        }
        
        function resetFilters() {
            $('#searchInput').val('');
            $('#categoryFilter').val('');
            $('#stockFilter').val('all');
            $('#sortSelect').val('id_asc');
            renderProducts();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        $(document).ready(function() {
            loadCategories();
            loadProducts();
        });
        
        $(window).click(function(event) {
            if ($(event.target).is('#editModal')) closeEditModal();
        });
    </script>
</body>
</html>
