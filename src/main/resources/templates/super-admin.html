<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель суперадминистратора - Управление пользователями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-home {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        .search-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .role-filter, .sort-filter {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        .filter-active {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-active label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .role-super-admin {
            background: #9b59b6;
            color: white;
        }
        .role-admin {
            background: #e74c3c;
            color: white;
        }
        .role-consultant {
            background: #3498db;
            color: white;
        }
        .role-client {
            background: #2ecc71;
            color: white;
        }
        .status-active {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #d4edda;
            color: #28a745;
        }
        .status-blocked {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #f8d7da;
            color: #dc3545;
        }
        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin: 0 2px;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-1px);
        }
        .btn-block {
            background: #ffc107;
            color: #333;
        }
        .btn-unblock {
            background: #28a745;
            color: white;
        }
        .btn-reset-password {
            background: #17a2b8;
            color: white;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 15% auto;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal-btn.confirm {
            background: #28a745;
            color: white;
        }
        .modal-btn.cancel {
            background: #6c757d;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            animation: slideInRight 0.3s ease-out;
        }
        .toast.error {
            background: #f56565;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            th, td {
                padding: 8px;
                font-size: 12px;
            }
            .stats {
                flex-direction: column;
            }
            .search-filter {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 Панель суперадминистратора</h1>
            <button class="btn-home" onclick="goToHome()">🏠 На главную</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Всего пользователей</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">Активные</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="blockedCount">0</div>
                <div class="stat-label">Заблокированные</div>
            </div>
        </div>
        
        <div class="search-filter">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Поиск по имени, email или телефону...">
            <select id="roleFilter" class="role-filter">
                <option value="all">Все роли</option>
                <option value="SUPER_ADMIN">👑 Суперадмин</option>
                <option value="ADMIN">🛠️ Администратор</option>
                <option value="CONSULTANT">📋 Консультант</option>
                <option value="CLIENT">👤 Клиент</option>
            </select>
            <select id="sortFilter" class="sort-filter">
                <option value="id_asc">По ID (возрастание)</option>
                <option value="id_desc">По ID (убывание)</option>
                <option value="date_asc">По дате (старые сначала)</option>
                <option value="date_desc" selected>По дате (новые сначала)</option>
                <option value="name_asc">По имени (А-Я)</option>
                <option value="name_desc">По имени (Я-А)</option>
            </select>
            <div class="filter-active">
                <label>
                    <input type="checkbox" id="showActiveOnly"> Только активные
                </label>
            </div>
        </div>
        
        <div style="overflow-x: auto;">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя пользователя</th>
                        <th>Email</th>
                        <th>Телефон</th>
                        <th>Роль</th>
                        <th>Дата регистрации</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Модальное окно сброса пароля -->
    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <h3>Сброс пароля</h3>
            <p id="resetUserInfo">Пользователь: <strong></strong></p>
            <p>Новый пароль: <strong id="newPassword"></strong></p>
            <div class="modal-buttons">
                <button class="modal-btn confirm" onclick="confirmResetPassword()">Сбросить</button>
                <button class="modal-btn cancel" onclick="closeResetModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно удаления -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>Подтверждение удаления</h3>
            <p>Вы уверены, что хотите удалить пользователя <strong id="deleteUserName"></strong>?</p>
            <div class="modal-buttons">
                <button class="modal-btn confirm" onclick="confirmDelete()">Удалить</button>
                <button class="modal-btn cancel" onclick="closeDeleteModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        let allUsers = [];
        let currentUserId = null;
        let currentSuperAdminId = null;
        let currentSuperAdminEmail = null;
        let passwordToReset = null;
        
        function goToHome() {
            window.location.href = '/';
        }
        
        function showToast(message, type) {
            type = type || 'success';
            $('.toast').remove();
            var toast = $('<div class="toast ' + type + '">' + message + '</div>');
            $('body').append(toast);
            setTimeout(function() {
                toast.remove();
            }, 3000);
        }
        
        function generateRandomPassword() {
            var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            var password = '';
            for (var i = 0; i < 10; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return password;
        }
        
        function getCurrentUser() {
            $.ajax({
                url: '/api/user/status',
                type: 'GET',
                async: false,
                success: function(response) {
                    if (response.authenticated) {
                        currentSuperAdminEmail = response.email;
                    }
                }
            });
            
            $.ajax({
                url: '/api/users/all',
                type: 'GET',
                async: false,
                success: function(users) {
                    for (var i = 0; i < users.length; i++) {
                        if (users[i].email === currentSuperAdminEmail) {
                            currentSuperAdminId = users[i].id;
                            break;
                        }
                    }
                }
            });
        }
        
        function loadUsers() {
            $.get('/api/users/all', function(users) {
                allUsers = users;
                renderUsers();
            });
        }
        
        function renderUsers() {
            var searchTerm = document.getElementById('searchInput').value.toLowerCase();
            var roleFilter = document.getElementById('roleFilter').value;
            var showActiveOnly = document.getElementById('showActiveOnly').checked;
            var sortType = document.getElementById('sortFilter').value;
            
            var filteredUsers = allUsers.filter(function(user) {
                var matchesSearch = user.fullName.toLowerCase().includes(searchTerm) ||
                                   user.email.toLowerCase().includes(searchTerm) ||
                                   (user.phone && user.phone.includes(searchTerm));
                var matchesRole = (roleFilter === 'all') || (user.role === roleFilter);
                var matchesActive = !showActiveOnly || !user.blocked;
                return matchesSearch && matchesRole && matchesActive;
            });
            
            // Сортировка
            if (sortType === 'id_asc') {
                filteredUsers.sort(function(a, b) { return a.id - b.id; });
            } else if (sortType === 'id_desc') {
                filteredUsers.sort(function(a, b) { return b.id - a.id; });
            } else if (sortType === 'date_asc') {
                filteredUsers.sort(function(a, b) {
                    var dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
                    var dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
                    return dateA - dateB;
                });
            } else if (sortType === 'date_desc') {
                filteredUsers.sort(function(a, b) {
                    var dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
                    var dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
                    return dateB - dateA;
                });
            } else if (sortType === 'name_asc') {
                filteredUsers.sort(function(a, b) { return a.fullName.localeCompare(b.fullName); });
            } else if (sortType === 'name_desc') {
                filteredUsers.sort(function(a, b) { return b.fullName.localeCompare(a.fullName); });
            }
            
            var total = allUsers.length;
            var active = allUsers.filter(function(u) { return !u.blocked; }).length;
            var blocked = allUsers.filter(function(u) { return u.blocked; }).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('blockedCount').textContent = blocked;
            
            var tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            
            for (var i = 0; i < filteredUsers.length; i++) {
                var user = filteredUsers[i];
                var isCurrentUser = (user.id === currentSuperAdminId);
                var isSuperAdmin = (user.role === 'SUPER_ADMIN');
                
                var row = tbody.insertRow();
                
                row.insertCell(0).textContent = user.id;
                row.insertCell(1).textContent = user.fullName;
                row.insertCell(2).textContent = user.email;
                row.insertCell(3).textContent = user.phone || '-';
                
                var roleCell = row.insertCell(4);
                var roleBadge = document.createElement('span');
                roleBadge.className = 'role-badge';
                
                if (user.role === 'SUPER_ADMIN') {
                    roleBadge.classList.add('role-super-admin');
                    roleBadge.textContent = '👑 SUPER_ADMIN';
                } else if (user.role === 'ADMIN') {
                    roleBadge.classList.add('role-admin');
                    roleBadge.textContent = '🛠️ ADMIN';
                } else if (user.role === 'CONSULTANT') {
                    roleBadge.classList.add('role-consultant');
                    roleBadge.textContent = '📋 CONSULTANT';
                } else {
                    roleBadge.classList.add('role-client');
                    roleBadge.textContent = '👤 CLIENT';
                }
                roleCell.appendChild(roleBadge);
                
                var dateCell = row.insertCell(5);
                if (user.createdAt) {
                    var date = new Date(user.createdAt);
                    dateCell.textContent = date.toLocaleDateString('ru-RU') + ', ' + date.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
                } else {
                    dateCell.textContent = '-';
                }
                
                var statusCell = row.insertCell(6);
                var statusSpan = document.createElement('span');
                if (user.blocked) {
                    statusSpan.className = 'status-blocked';
                    statusSpan.textContent = '🔒 Заблокирован';
                } else {
                    statusSpan.className = 'status-active';
                    statusSpan.textContent = '✅ Активен';
                }
                statusCell.appendChild(statusSpan);
                
                var actionsCell = row.insertCell(7);
                
                if (!isCurrentUser && !isSuperAdmin) {
                    if (!user.blocked) {
                        var blockBtn = document.createElement('button');
                        blockBtn.className = 'action-btn btn-block';
                        blockBtn.textContent = '🔒 Заблокировать';
                        blockBtn.onclick = (function(id) {
                            return function() { blockUser(id); };
                        })(user.id);
                        actionsCell.appendChild(blockBtn);
                    } else {
                        var unblockBtn = document.createElement('button');
                        unblockBtn.className = 'action-btn btn-unblock';
                        unblockBtn.textContent = '🔓 Разблокировать';
                        unblockBtn.onclick = (function(id) {
                            return function() { unblockUser(id); };
                        })(user.id);
                        actionsCell.appendChild(unblockBtn);
                    }
                    
                    var resetBtn = document.createElement('button');
                    resetBtn.className = 'action-btn btn-reset-password';
                    resetBtn.textContent = '🔄 Сброс пароля';
                    resetBtn.onclick = (function(id, name) {
                        return function() { openResetModal(id, name); };
                    })(user.id, user.fullName);
                    actionsCell.appendChild(resetBtn);
                    
                    var deleteBtn = document.createElement('button');
                    deleteBtn.className = 'action-btn btn-delete';
                    deleteBtn.textContent = '🗑️ Удалить';
                    deleteBtn.onclick = (function(id, name) {
                        return function() { openDeleteModal(id, name); };
                    })(user.id, user.fullName);
                    actionsCell.appendChild(deleteBtn);
                } else if (isCurrentUser) {
                    var noteSpan = document.createElement('span');
                    noteSpan.style.color = '#999';
                    noteSpan.style.fontSize = '12px';
                    noteSpan.textContent = '⚠️ Вы не можете редактировать себя';
                    actionsCell.appendChild(noteSpan);
                } else if (isSuperAdmin && !isCurrentUser) {
                    var noteSpan = document.createElement('span');
                    noteSpan.style.color = '#999';
                    noteSpan.style.fontSize = '12px';
                    noteSpan.textContent = '👑 Нельзя редактировать суперадмина';
                    actionsCell.appendChild(noteSpan);
                }
            }
        }
        
        function blockUser(id) {
            $.ajax({
                url: '/super-admin/users/block/' + id,
                type: 'POST',
                success: function() {
                    showToast('🔒 Пользователь заблокирован');
                    loadUsers();
                },
                error: function() {
                    showToast('❌ Ошибка блокировки', 'error');
                }
            });
        }
        
        function unblockUser(id) {
            $.ajax({
                url: '/super-admin/users/unblock/' + id,
                type: 'POST',
                success: function() {
                    showToast('🔓 Пользователь разблокирован');
                    loadUsers();
                },
                error: function() {
                    showToast('❌ Ошибка разблокировки', 'error');
                }
            });
        }
        
        function openResetModal(id, name) {
            currentUserId = id;
            passwordToReset = generateRandomPassword();
            document.getElementById('resetUserInfo').innerHTML = 'Пользователь: <strong>' + escapeHtml(name) + '</strong>';
            document.getElementById('newPassword').textContent = passwordToReset;
            document.getElementById('resetPasswordModal').style.display = 'block';
        }
        
        function confirmResetPassword() {
            $.ajax({
                url: '/super-admin/users/reset-password/' + currentUserId,
                type: 'POST',
                data: { newPassword: passwordToReset },
                success: function() {
                    showToast('✅ Пароль успешно сброшен. Новый пароль: ' + passwordToReset);
                    closeResetModal();
                },
                error: function() {
                    showToast('❌ Ошибка сброса пароля', 'error');
                }
            });
        }
        
        function closeResetModal() {
            document.getElementById('resetPasswordModal').style.display = 'none';
            currentUserId = null;
            passwordToReset = null;
        }
        
        function openDeleteModal(id, name) {
            currentUserId = id;
            document.getElementById('deleteUserName').textContent = name;
            document.getElementById('deleteModal').style.display = 'block';
        }
        
        function confirmDelete() {
            $.ajax({
                url: '/super-admin/users/delete/' + currentUserId,
                type: 'DELETE',
                success: function() {
                    showToast('🗑️ Пользователь удалён');
                    closeDeleteModal();
                    loadUsers();
                },
                error: function(xhr) {
                    var errorMsg = xhr.responseText || 'Ошибка удаления пользователя';
                    showToast('❌ ' + errorMsg, 'error');
                }
            });
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
            currentUserId = null;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        document.getElementById('searchInput').addEventListener('input', function() {
            renderUsers();
        });
        
        document.getElementById('roleFilter').addEventListener('change', function() {
            renderUsers();
        });
        
        document.getElementById('sortFilter').addEventListener('change', function() {
            renderUsers();
        });
        
        document.getElementById('showActiveOnly').addEventListener('change', function() {
            renderUsers();
        });
        
        getCurrentUser();
        loadUsers();
    </script>
</body>
</html>
