<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель консультанта - Заявки клиентов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-home {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        /* Поиск и фильтры */
        .search-filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input {
            flex: 2;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-select, .sort-select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        .btn-search, .btn-reset {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-search {
            background: #667eea;
            color: white;
        }
        .btn-search:hover {
            background: #5a67d8;
        }
        .btn-reset {
            background: #6c757d;
            color: white;
        }
        .btn-reset:hover {
            background: #5a6268;
        }
        
        /* Дополнительные фильтры */
        .extra-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .extra-filters label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .date-range {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .date-range input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }
        th:hover {
            background: #5a67d8;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .status-select {
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }
        .consulted-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.3s;
            font-weight: bold;
        }
        .consulted-btn:hover {
            transform: scale(1.05);
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-pending {
            background: #ffc107;
            color: #856404;
        }
        .badge-progress {
            background: #17a2b8;
            color: white;
        }
        .badge-completed {
            background: #28a745;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            animation: slideInRight 0.3s ease-out;
        }
        .toast.error {
            background: #f56565;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            th, td { padding: 8px; font-size: 12px; }
            .stats { flex-direction: column; }
            .search-filter-bar, .extra-filters { flex-direction: column; }
            .date-range { flex-direction: column; width: 100%; }
            .date-range input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Панель консультанта</h1>
            <button class="btn-home" onclick="goToHome()">🏠 На главную</button>
        </div>
        <div class="subtitle" style="color:#666; margin-bottom:20px;">Управление заявками клиентов мебельного магазина</div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Всего заявок</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">🟡 Новые</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="progressCount">0</div>
                <div class="stat-label">🔵 В обработке</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">✅ Завершённые</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="consultedCount">0</div>
                <div class="stat-label">📞 Консультация проведена</div>
            </div>
        </div>
        
        <!-- Поиск и основные фильтры -->
        <div class="search-filter-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по клиенту, телефону, email или товару...">
            <select id="statusFilter" class="filter-select">
                <option value="all">Все статусы</option>
                <option value="PENDING">🟡 Новые</option>
                <option value="IN_PROGRESS">🔵 В обработке</option>
                <option value="COMPLETED">✅ Завершённые</option>
            </select>
            <select id="sortSelect" class="sort-select">
                <option value="date_desc">По дате (новые сначала)</option>
                <option value="date_asc">По дате (старые сначала)</option>
                <option value="name_asc">По клиенту (А-Я)</option>
                <option value="name_desc">По клиенту (Я-А)</option>
                <option value="status_asc">По статусу</option>
            </select>
            <button class="btn-search" onclick="applyFilters()">🔍 Применить</button>
            <button class="btn-reset" onclick="resetFilters()">🔄 Сбросить</button>
        </div>
        
        <!-- Дополнительные фильтры -->
        <div class="extra-filters">
            <label>
                <input type="checkbox" id="consultedFilter"> Только с проведённой консультацией
            </label>
            <label>
                <input type="checkbox" id="notConsultedFilter"> Только без консультации
            </label>
            <div class="date-range">
                <span>📅 Дата с:</span>
                <input type="date" id="dateFrom">
                <span>по:</span>
                <input type="date" id="dateTo">
            </div>
        </div>
        
        <div style="overflow-x: auto;">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th onclick="sortBy('id')">ID ⬍</th>
                        <th onclick="sortBy('date')">Дата ⬍</th>
                        <th onclick="sortBy('name')">Клиент ⬍</th>
                        <th>Телефон</th>
                        <th>Email</th>
                        <th onclick="sortBy('product')">Товар ⬍</th>
                        <th>Категория</th>
                        <th onclick="sortBy('status')">Статус ⬍</th>
                        <th onclick="sortBy('consulted')">Консультация ⬍</th>
                    </tr>
                </thead>
                <tbody id="ordersBody"></tbody>
            </table>
        </div>
        
        <footer style="margin-top: 30px; text-align: center; color: #999; font-size: 12px;">
            <p>© 2026 Мебельный склад - АИС учёта деятельности</p>
        </footer>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        let ordersData = [];
        let currentSort = { field: 'date', order: 'desc' };
        
        function goToHome() {
            window.location.href = '/';
        }
        
        function showToast(message, type) {
            type = type || 'success';
            $('.toast').remove();
            var toast = $('<div class="toast ' + type + '">' + message + '</div>');
            $('body').append(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }
        
        // Функция для ограничения даты (год не больше текущего)
        function setupDateRestrictions() {
            var today = new Date();
            var currentYear = today.getFullYear();
            var currentMonth = String(today.getMonth() + 1).padStart(2, '0');
            var currentDay = String(today.getDate()).padStart(2, '0');
            var todayDateStr = currentYear + '-' + currentMonth + '-' + currentDay;
            
            var dateFrom = document.getElementById('dateFrom');
            var dateTo = document.getElementById('dateTo');
            
            if (dateFrom) {
                dateFrom.setAttribute('max', todayDateStr);
                
                dateFrom.addEventListener('change', function() {
                    var fromDate = new Date(this.value);
                    var toDate = dateTo.value ? new Date(dateTo.value) : null;
                    
                    if (fromDate > today) {
                        this.value = todayDateStr;
                        showToast('Дата не может быть позже сегодняшнего дня', 'error');
                    }
                    
                    if (toDate && fromDate > toDate) {
                        dateTo.value = this.value;
                    }
                    
                    var selectedYear = fromDate.getFullYear();
                    if (selectedYear > currentYear) {
                        this.value = todayDateStr;
                        showToast('Год не может быть больше текущего', 'error');
                    }
                });
            }
            
            if (dateTo) {
                dateTo.setAttribute('max', todayDateStr);
                
                dateTo.addEventListener('change', function() {
                    var toDate = new Date(this.value);
                    var fromDate = dateFrom.value ? new Date(dateFrom.value) : null;
                    
                    if (toDate > today) {
                        this.value = todayDateStr;
                        showToast('Дата не может быть позже сегодняшнего дня', 'error');
                    }
                    
                    if (fromDate && toDate < fromDate) {
                        this.value = dateFrom.value;
                    }
                    
                    var selectedYear = toDate.getFullYear();
                    if (selectedYear > currentYear) {
                        this.value = todayDateStr;
                        showToast('Год не может быть больше текущего', 'error');
                    }
                });
            }
        }
        
        function loadRequests() {
            $.ajax({
                url: '/api/requests/all',
                type: 'GET',
                success: function(requests) {
                    ordersData = requests.map(function(r) {
                        return {
                            id: r.id,
                            date: r.requestDate,
                            dateFormatted: new Date(r.requestDate).toLocaleString(),
                            name: r.fullName,
                            phone: r.phone,
                            email: r.email,
                            product: r.product ? r.product.name : 'Не указан',
                            category: r.product && r.product.category ? r.product.category.name : 'Без категории',
                            status: r.status,
                            consulted: r.status === 'COMPLETED'
                        };
                    });
                    applyFilters();
                },
                error: function() {
                    showToast('Ошибка загрузки заявок', 'error');
                }
            });
        }
        
        function applyFilters() {
            var searchTerm = $('#searchInput').val().toLowerCase();
            var statusFilter = $('#statusFilter').val();
            var consultedOnly = $('#consultedFilter').is(':checked');
            var notConsultedOnly = $('#notConsultedFilter').is(':checked');
            var dateFrom = $('#dateFrom').val();
            var dateTo = $('#dateTo').val();
            var sortType = $('#sortSelect').val();
            
            var filtered = ordersData.filter(function(order) {
                var matchSearch = order.name.toLowerCase().includes(searchTerm) ||
                               order.phone.includes(searchTerm) ||
                               order.email.toLowerCase().includes(searchTerm) ||
                               order.product.toLowerCase().includes(searchTerm);
                var matchStatus = (statusFilter === 'all') || (order.status === statusFilter);
                var matchConsulted = true;
                if (consultedOnly && notConsultedOnly) {
                    matchConsulted = true;
                } else if (consultedOnly) {
                    matchConsulted = order.consulted === true;
                } else if (notConsultedOnly) {
                    matchConsulted = order.consulted === false;
                }
                
                var matchDate = true;
                if (dateFrom) {
                    var orderDate = new Date(order.date);
                    var fromDate = new Date(dateFrom);
                    fromDate.setHours(0, 0, 0, 0);
                    matchDate = matchDate && orderDate >= fromDate;
                }
                if (dateTo) {
                    var orderDate = new Date(order.date);
                    var toDate = new Date(dateTo);
                    toDate.setHours(23, 59, 59, 999);
                    matchDate = matchDate && orderDate <= toDate;
                }
                
                return matchSearch && matchStatus && matchConsulted && matchDate;
            });
            
            // Сортировка
            if (sortType === 'date_desc') {
                filtered.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
            } else if (sortType === 'date_asc') {
                filtered.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
            } else if (sortType === 'name_asc') {
                filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });
            } else if (sortType === 'name_desc') {
                filtered.sort(function(a, b) { return b.name.localeCompare(a.name); });
            } else if (sortType === 'status_asc') {
                var statusOrder = { 'PENDING': 1, 'IN_PROGRESS': 2, 'COMPLETED': 3 };
                filtered.sort(function(a, b) { return statusOrder[a.status] - statusOrder[b.status]; });
            }
            
            renderTable(filtered);
        }
        
        function sortBy(field) {
            if (currentSort.field === field) {
                currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.order = 'asc';
            }
            
            var filtered = ordersData;
            
            if (currentSort.field === 'id') {
                filtered.sort(function(a, b) { return currentSort.order === 'asc' ? a.id - b.id : b.id - a.id; });
            } else if (currentSort.field === 'date') {
                filtered.sort(function(a, b) { return currentSort.order === 'asc' ? new Date(a.date) - new Date(b.date) : new Date(b.date) - new Date(a.date); });
            } else if (currentSort.field === 'name') {
                filtered.sort(function(a, b) { return currentSort.order === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name); });
            } else if (currentSort.field === 'product') {
                filtered.sort(function(a, b) { return currentSort.order === 'asc' ? a.product.localeCompare(b.product) : b.product.localeCompare(a.product); });
            } else if (currentSort.field === 'status') {
                var statusOrder = { 'PENDING': 1, 'IN_PROGRESS': 2, 'COMPLETED': 3 };
                filtered.sort(function(a, b) { return currentSort.order === 'asc' ? statusOrder[a.status] - statusOrder[b.status] : statusOrder[b.status] - statusOrder[a.status]; });
            } else if (currentSort.field === 'consulted') {
                filtered.sort(function(a, b) { return currentSort.order === 'asc' ? (a.consulted === b.consulted ? 0 : a.consulted ? 1 : -1) : (a.consulted === b.consulted ? 0 : a.consulted ? -1 : 1); });
            }
            
            renderTable(filtered);
        }
        
        function renderTable(filteredOrders) {
            var total = ordersData.length;
            var pending = ordersData.filter(function(o) { return o.status === 'PENDING'; }).length;
            var progress = ordersData.filter(function(o) { return o.status === 'IN_PROGRESS'; }).length;
            var completed = ordersData.filter(function(o) { return o.status === 'COMPLETED'; }).length;
            var consulted = ordersData.filter(function(o) { return o.consulted === true; }).length;
            
            $('#totalCount').text(total);
            $('#pendingCount').text(pending);
            $('#progressCount').text(progress);
            $('#completedCount').text(completed);
            $('#consultedCount').text(consulted);
            
            var tbody = $('#ordersBody');
            tbody.empty();
            
            for (var i = 0; i < filteredOrders.length; i++) {
                var order = filteredOrders[i];
                
                var statusClass = '';
                var statusText = '';
                if (order.status === 'PENDING') {
                    statusClass = 'badge-pending';
                    statusText = '🟡 Новая';
                } else if (order.status === 'IN_PROGRESS') {
                    statusClass = 'badge-progress';
                    statusText = '🔵 В обработке';
                } else {
                    statusClass = 'badge-completed';
                    statusText = '✅ Завершена';
                }
                
                var row = '<tr>' +
                    '<td>' + order.id + '</td>' +
                    '<td>' + order.dateFormatted + '</td>' +
                    '<td>' + escapeHtml(order.name) + '</td>' +
                    '<td>' + order.phone + '</td>' +
                    '<td>' + order.email + '</td>' +
                    '<td>' + escapeHtml(order.product) + '</td>' +
                    '<td>' + escapeHtml(order.category) + '</td>' +
                    '<td>' +
                        '<select class="status-select" data-id="' + order.id + '" onchange="changeStatus(' + order.id + ', this.value)">' +
                            '<option value="PENDING"' + (order.status === 'PENDING' ? ' selected' : '') + '>🟡 Новая</option>' +
                            '<option value="IN_PROGRESS"' + (order.status === 'IN_PROGRESS' ? ' selected' : '') + '>🔵 В обработке</option>' +
                            '<option value="COMPLETED"' + (order.status === 'COMPLETED' ? ' selected' : '') + '>✅ Завершена</option>' +
                        '</select>' +
                    '</td>' +
                    '<td>' +
                        '<button class="consulted-btn" style="background:' + (order.consulted ? '#d4edda' : '#f8d7da') + '; color:' + (order.consulted ? '#28a745' : '#dc3545') + '" onclick="toggleConsulted(' + order.id + ')">' + (order.consulted ? '✅ Проведена' : '❌ Не проведена') + '</button>' +
                    '</td>' +
                '</tr>';
                tbody.append(row);
            }
            
            if (filteredOrders.length === 0) {
                tbody.append('<tr><td colspan="9" style="text-align:center;">Заявки не найдены</td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td><td style="display:none;"></td></tr>');
            }
        }
        
        function changeStatus(id, newStatus) {
            var index = -1;
            for (var i = 0; i < ordersData.length; i++) {
                if (ordersData[i].id === id) {
                    index = i;
                    break;
                }
            }
            if (index !== -1) {
                ordersData[index].status = newStatus;
                if (newStatus === 'COMPLETED') {
                    ordersData[index].consulted = true;
                }
                showToast('Заявка #' + id + ': статус изменён');
                applyFilters();
            }
        }
        
        function toggleConsulted(id) {
            var index = -1;
            for (var i = 0; i < ordersData.length; i++) {
                if (ordersData[i].id === id) {
                    index = i;
                    break;
                }
            }
            if (index !== -1) {
                ordersData[index].consulted = !ordersData[index].consulted;
                showToast('Заявка #' + id + ': консультация ' + (ordersData[index].consulted ? 'проведена' : 'не проведена'));
                applyFilters();
            }
        }
        
        function resetFilters() {
            $('#searchInput').val('');
            $('#statusFilter').val('all');
            $('#consultedFilter').prop('checked', false);
            $('#notConsultedFilter').prop('checked', false);
            $('#dateFrom').val('');
            $('#dateTo').val('');
            $('#sortSelect').val('date_desc');
            applyFilters();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // События фильтрации
        $('#searchInput').on('input', function() { applyFilters(); });
        $('#statusFilter').on('change', function() { applyFilters(); });
        $('#consultedFilter').on('change', function() { 
            if ($(this).is(':checked')) $('#notConsultedFilter').prop('checked', false);
            applyFilters();
        });
        $('#notConsultedFilter').on('change', function() { 
            if ($(this).is(':checked')) $('#consultedFilter').prop('checked', false);
            applyFilters();
        });
        $('#dateFrom, #dateTo').on('change', function() { applyFilters(); });
        $('#sortSelect').on('change', function() { applyFilters(); });
        
        // Инициализация
        $(document).ready(function() {
            // Установка максимальной даты
            var today = new Date();
            var currentYear = today.getFullYear();
            var currentMonth = String(today.getMonth() + 1).padStart(2, '0');
            var currentDay = String(today.getDate()).padStart(2, '0');
            var maxDate = currentYear + '-' + currentMonth + '-' + currentDay;
            
            $('#dateFrom, #dateTo').attr('max', maxDate);
            
            // Установка ограничений на год
            setupDateRestrictions();
            
            loadRequests();
        });
    </script>
</body>
</html>
