<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель консультанта - Заявки клиентов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-home {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #e9ecef;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .status-select {
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }
        .consulted-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.3s;
            font-weight: bold;
        }
        .consulted-btn:hover {
            transform: scale(1.05);
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            animation: slideInRight 0.3s ease-out;
        }
        .toast.error {
            background: #f56565;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        footer {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            th, td {
                padding: 8px;
                font-size: 12px;
            }
            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Панель консультанта</h1>
            <button class="btn-home" onclick="goToHome()">🏠 На главную</button>
        </div>
        <div class="subtitle">Управление заявками клиентов мебельного магазина</div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Всего заявок</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="newCount">0</div>
                <div class="stat-label">🟡 Новые</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="processingCount">0</div>
                <div class="stat-label">🔵 В обработке</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">✅ Завершённые</div>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">📋 Все</button>
            <button class="filter-btn" data-filter="PENDING">🟡 Новые</button>
            <button class="filter-btn" data-filter="IN_PROGRESS">🔵 В обработке</button>
            <button class="filter-btn" data-filter="COMPLETED">✅ Завершённые</button>
        </div>
        
        <div style="overflow-x: auto;">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Клиент</th>
                        <th>Телефон</th>
                        <th>Email</th>
                        <th>Товар</th>
                        <th>Категория</th>
                        <th>Статус</th>
                        <th>Консультация</th>
                    </tr>
                </thead>
                <tbody id="ordersBody"></tbody>
            </table>
        </div>
        
        <footer>
            <p>© 2026 Мебельный склад - АИС учёта деятельности</p>
        </footer>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        let ordersData = [];
        let currentFilter = 'all';
        
        function goToHome() {
            window.location.href = '/';
        }
        
        function showToast(message, type) {
            type = type || 'success';
            $('.toast').remove();
            var toast = $('<div class="toast ' + type + '">' + message + '</div>');
            $('body').append(toast);
            setTimeout(function() {
                toast.remove();
            }, 3000);
        }
        
        function loadRequests() {
            $.ajax({
                url: '/api/requests/all',
                type: 'GET',
                success: function(requests) {
                    ordersData = requests.map(function(r) {
                        return {
                            id: r.id,
                            date: new Date(r.requestDate).toLocaleString(),
                            name: r.fullName,
                            phone: r.phone,
                            email: r.email,
                            product: r.product ? r.product.name : 'Не указан',
                            category: r.product && r.product.category ? r.product.category.name : 'Без категории',
                            status: r.status,
                            consulted: r.status === 'COMPLETED'
                        };
                    });
                    renderTable();
                },
                error: function() {
                    showToast('Ошибка загрузки заявок', 'error');
                }
            });
        }
        
        function renderTable() {
            var filteredOrders = currentFilter === 'all' ? ordersData : ordersData.filter(function(order) {
                return order.status === currentFilter;
            });
            
            var total = ordersData.length;
            var newCount = ordersData.filter(function(o) { return o.status === 'PENDING'; }).length;
            var processingCount = ordersData.filter(function(o) { return o.status === 'IN_PROGRESS'; }).length;
            var completedCount = ordersData.filter(function(o) { return o.status === 'COMPLETED'; }).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('newCount').textContent = newCount;
            document.getElementById('processingCount').textContent = processingCount;
            document.getElementById('completedCount').textContent = completedCount;
            
            var tbody = document.getElementById('ordersBody');
            tbody.innerHTML = '';
            
            for (var i = 0; i < filteredOrders.length; i++) {
                var order = filteredOrders[i];
                var row = tbody.insertRow();
                
                row.insertCell(0).textContent = order.id;
                row.insertCell(1).textContent = order.date;
                row.insertCell(2).textContent = order.name;
                row.insertCell(3).textContent = order.phone;
                row.insertCell(4).textContent = order.email;
                row.insertCell(5).textContent = order.product;
                row.insertCell(6).textContent = order.category;
                
                var statusCell = row.insertCell(7);
                var select = document.createElement('select');
                select.className = 'status-select';
                select.setAttribute('data-id', order.id);
                
                var optionNew = document.createElement('option');
                optionNew.value = 'PENDING';
                optionNew.textContent = '🟡 PENDING (Новая)';
                
                var optionProcessing = document.createElement('option');
                optionProcessing.value = 'IN_PROGRESS';
                optionProcessing.textContent = '🔵 IN_PROGRESS (В обработке)';
                
                var optionCompleted = document.createElement('option');
                optionCompleted.value = 'COMPLETED';
                optionCompleted.textContent = '✅ COMPLETED (Завершена)';
                
                select.appendChild(optionNew);
                select.appendChild(optionProcessing);
                select.appendChild(optionCompleted);
                
                if (order.status === 'PENDING') select.value = 'PENDING';
                else if (order.status === 'IN_PROGRESS') select.value = 'IN_PROGRESS';
                else select.value = 'COMPLETED';
                
                select.onchange = (function(id) {
                    return function(e) {
                        changeStatus(id, this.value);
                    };
                })(order.id);
                
                statusCell.appendChild(select);
                
                var consultedCell = row.insertCell(8);
                var consultedBtn = document.createElement('button');
                consultedBtn.className = 'consulted-btn';
                if (order.consulted) {
                    consultedBtn.innerHTML = '✅ Проведена';
                    consultedBtn.style.background = '#d4edda';
                    consultedBtn.style.color = '#28a745';
                } else {
                    consultedBtn.innerHTML = '❌ Не проведена';
                    consultedBtn.style.background = '#f8d7da';
                    consultedBtn.style.color = '#dc3545';
                }
                consultedBtn.onclick = (function(id) {
                    return function() {
                        toggleConsulted(id);
                    };
                })(order.id);
                consultedCell.appendChild(consultedBtn);
            }
        }
        
        function changeStatus(id, newStatus) {
            var index = -1;
            for (var i = 0; i < ordersData.length; i++) {
                if (ordersData[i].id === id) {
                    index = i;
                    break;
                }
            }
            if (index !== -1) {
                ordersData[index].status = newStatus;
                showToast('Заявка #' + id + ': статус изменён');
                renderTable();
            }
        }
        
        function toggleConsulted(id) {
            var index = -1;
            for (var i = 0; i < ordersData.length; i++) {
                if (ordersData[i].id === id) {
                    index = i;
                    break;
                }
            }
            if (index !== -1) {
                ordersData[index].consulted = !ordersData[index].consulted;
                showToast('Заявка #' + id + ': консультация ' + (ordersData[index].consulted ? 'проведена' : 'не проведена'));
                renderTable();
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        var filterBtns = document.querySelectorAll('.filter-btn');
        for (var i = 0; i < filterBtns.length; i++) {
            filterBtns[i].addEventListener('click', function() {
                for (var j = 0; j < filterBtns.length; j++) {
                    filterBtns[j].classList.remove('active');
                }
                this.classList.add('active');
                currentFilter = this.getAttribute('data-filter');
                renderTable();
            });
        }
        
        loadRequests();
    </script>
</body>
</html>
