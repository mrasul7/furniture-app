spring.datasource.url=jdbc:postgresql://postgres:5432/test_db
spring.datasource.username=test_user
spring.datasource.password=test_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

server.port=8080

# Важно: сначала Hibernate создаст таблицы, потом выполнится data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Добавьте настройки часового пояса
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Moscow